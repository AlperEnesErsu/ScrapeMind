{% extends 'base.html' %}
{% block title %}{{ _('Dashboard') }} — ScrapeMind{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-speedometer2 me-2"></i>{{ _('Dashboard') }}</h4>
</div>

<div class="row g-3">
  <div class="col-sm-6 col-xl-3">
    <div class="card text-bg-primary">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="fs-2 fw-bold">—</div>
          <div class="small">{{ _('Scrape Jobs') }}</div>
        </div>
        <i class="bi bi-bug fs-1 opacity-50"></i>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-xl-3">
    <div class="card text-bg-success">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="fs-2 fw-bold">—</div>
          <div class="small">{{ _('Active Users') }}</div>
        </div>
        <i class="bi bi-people fs-1 opacity-50"></i>
      </div>
    </div>
  </div>
</div>

<p class="text-muted mt-4 small">{{ _('ScrapeMind modules will populate this dashboard in Faz 2.') }}</p>
{% endblock %}
