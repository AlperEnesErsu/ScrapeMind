{# Şifre politikası hint — şifre alanının altına ekle:
   {% include 'core/_password_rules.html' %}
#}
<ul class="list-unstyled mb-0 mt-1 small text-muted" id="pw-rules">
  <li id="rule-length">   <i class="bi bi-circle me-1"></i>{{ _('At least 8 characters') }}</li>
  <li id="rule-uppercase"><i class="bi bi-circle me-1"></i>{{ _('At least one uppercase letter') }}</li>
  <li id="rule-lowercase"><i class="bi bi-circle me-1"></i>{{ _('At least one lowercase letter') }}</li>
  <li id="rule-digit">    <i class="bi bi-circle me-1"></i>{{ _('At least one digit') }}</li>
</ul>
<script>
(function () {
  const field = document.currentScript.previousElementSibling.previousElementSibling
                || document.querySelector('input[type=password]');
  const rules = {
    'rule-length':    p => p.length >= 8,
    'rule-uppercase': p => /[A-Z]/.test(p),
    'rule-lowercase': p => /[a-z]/.test(p),
    'rule-digit':     p => /[0-9]/.test(p),
  };
  function update(pw) {
    Object.entries(rules).forEach(([id, fn]) => {
      const li = document.getElementById(id);
      if (!li) return;
      const ok = fn(pw);
      li.querySelector('i').className = ok
        ? 'bi bi-check-circle-fill text-success me-1'
        : 'bi bi-circle me-1';
    });
  }
  // Şifre alanını bul (bu element'ten önceki ilk password input)
  const inputs = document.querySelectorAll('input[type=password]');
  if (inputs.length) {
    inputs[0].addEventListener('input', e => update(e.target.value));
  }
})();
</script>
