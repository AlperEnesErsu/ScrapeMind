{% if pagination.pages > 1 %}
<nav aria-label="{{ _('Pagination') }}">
  <ul class="pagination pagination-sm mb-0">
    <li class="page-item {{ 'disabled' if not pagination.has_prev }}">
      <a class="page-link" href="{{ request.path }}?page={{ pagination.prev_num }}{% for k,v in request.args.items() %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}">
        <i class="bi bi-chevron-left"></i>
      </a>
    </li>

    {% for p in pagination.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
      {% if p %}
        <li class="page-item {{ 'active' if p == pagination.page }}">
          <a class="page-link" href="{{ request.path }}?page={{ p }}{% for k,v in request.args.items() %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}">{{ p }}</a>
        </li>
      {% else %}
        <li class="page-item disabled"><span class="page-link">…</span></li>
      {% endif %}
    {% endfor %}

    <li class="page-item {{ 'disabled' if not pagination.has_next }}">
      <a class="page-link" href="{{ request.path }}?page={{ pagination.next_num }}{% for k,v in request.args.items() %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}">
        <i class="bi bi-chevron-right"></i>
      </a>
    </li>
  </ul>
</nav>
{% endif %}
