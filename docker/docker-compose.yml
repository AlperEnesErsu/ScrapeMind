version: "3.9"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: scrapemind
      POSTGRES_PASSWORD: scrapemind
      POSTGRES_DB: scrapemind
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapemind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://scrapemind:scrapemind@db:5432/scrapemind
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker — runs background tasks pulled from the Redis broker.
  # Profile: `tasks` so it's only spun up when you explicitly ask
  # (`docker compose --profile tasks up`). The web container stays
  # cheap for everyday dev.
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://scrapemind:scrapemind@db:5432/scrapemind
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["tasks"]

  # Celery beat scheduler — kicks periodic tasks into the broker.
  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://scrapemind:scrapemind@db:5432/scrapemind
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["tasks"]

volumes:
  pg_data:
